name: Test
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build from a clean tree
        run: |
          rm -rf build dist src/*.egg-info
          python -m pip wheel . --no-deps -w dist
      - name: Reject cross-branch files in the wheel
        run: >-
          python -c "import glob, zipfile;
          wheel=glob.glob('dist/*.whl')[0];
          names=zipfile.ZipFile(wheel).namelist();
          forbidden={'openagentrelay/hub.py','openagentrelay/models.py','openagentrelay/store.py'};
          assert forbidden.isdisjoint(names), sorted(forbidden.intersection(names))"
      - name: Test the installed wheel
        run: |
          python -m venv wheel-venv
          wheel-venv/bin/python -m pip install dist/*.whl
          wheel-venv/bin/python -m unittest discover -s tests -v
          wheel-venv/bin/relay version
