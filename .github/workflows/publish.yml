name: Publish

on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    name: Build and verify distribution
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install release tooling
        run: python -m pip install --upgrade build twine
      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: >-
          python -c "import os, pathlib, tomllib;
          version=tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'];
          expected=f'v{version}';
          actual=os.environ['RELEASE_TAG'];
          assert actual == expected, f'release tag {actual!r} must equal {expected!r}'"
      - name: Build wheel and source distribution
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check --strict dist/*
      - name: Store distribution packages
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/open-agent-relay
    permissions:
      id-token: write
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Upload distribution packages
        uses: pypa/gh-action-pypi-publish@release/v1
